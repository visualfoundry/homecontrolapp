<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #cfceca; overscroll-behavior: none; }
  #root { height: 100%; }
  #root ::-webkit-scrollbar { width: 0; height: 0; display: none; }
  button { font-family: inherit; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes rainfall { from { transform: translateY(-14px); opacity: 0; } 12% { opacity: 1; } to { transform: translateY(168px); opacity: 0.9; } }
  @keyframes snowfall { from { transform: translateY(-14px) translateX(0); opacity: 0; } 14% { opacity: 1; } to { transform: translateY(168px) translateX(14px); opacity: 0.9; } }
</style>
</head>

<div id="root"></div>
